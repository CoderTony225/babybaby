<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>无人机列表</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/4.6.0/css/bootstrap.min.css}"/>
</head>
<body>
<div id="app">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/uavs}">无人机台账</a>
            <div class="navbar-nav ml-auto">
                <a class="nav-link" th:href="@{/logout}">退出</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="alert alert-success" v-if="successMessage" v-text="successMessage"></div>
        <div class="alert alert-danger" v-if="errorMessage" v-text="errorMessage"></div>
        <h2 class="mb-4">无人机列表</h2>
        <form class="form-inline mb-4" method="get" th:action="@{/uavs}">
            <div class="form-group mr-2">
                <input class="form-control" name="keyword" placeholder="编号 / 型号 / 厂商" th:value="${keyword}"/>
            </div>
            <button type="submit" class="btn btn-secondary mr-2">查询</button>
            <a class="btn btn-primary" th:href="@{/uavs/new}">新建</a>
        </form>
        <table class="table table-striped table-bordered">
            <thead class="thead-dark">
            <tr>
                <th>ID</th>
                <th>机身编号</th>
                <th>型号</th>
                <th>制造厂商</th>
                <th>状态</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr v-for="u in items" :key="u.id">
                <td v-text="u.id"></td>
                <td v-text="u.frameSn"></td>
                <td v-text="u.modelName"></td>
                <td v-text="u.manufacturer || '—'"></td>
                <td>
                    <span :class="getStatusClass(u.status)" v-text="getStatusText(u.status)"></span>
                </td>
                <td>
                    <a class="btn btn-sm btn-info" :href="'/uavs/' + u.id">详细</a>
                    <a class="btn btn-sm btn-warning ml-1" :href="'/uavs/' + u.id + '/edit'">编辑</a>
                    <button class="btn btn-sm btn-danger ml-1" @click="confirmDelete(u.id, u.frameSn)">删除</button>
                </td>
            </tr>
            <tr v-if="items.length === 0">
                <td colspan="6" class="text-center text-muted">暂无数据</td>
            </tr>
            </tbody>
        </table>
        <nav v-if="totalPages > 1">
            <ul class="pagination">
                <li class="page-item" :class="{ 'disabled': page <= 1 }">
                    <a class="page-link" :href="'/uavs?keyword=' + keyword + '&page=' + (page - 1) + '&size=' + size"
                       aria-label="Previous"><span aria-hidden="true">&laquo;</span></a>
                </li>
                <li class="page-item disabled"><a class="page-link" href="#">第 {{ page }} / {{ totalPages }} 页</a></li>
                <li class="page-item" :class="{ 'disabled': page >= totalPages }">
                    <a class="page-link" :href="'/uavs?keyword=' + keyword + '&page=' + (page + 1) + '&size=' + size"
                       aria-label="Next"><span aria-hidden="true">&raquo;</span></a>
                </li>
            </ul>
        </nav>
    </div>
    <!-- 删除确认模态框 -->
    <div class="modal fade" id="deleteModal" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">确认删除</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <p>确定要删除无人机 <strong>{{ deleteFrameSn }}</strong> 吗？此操作无法撤销。</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" @click="deleteUav">确认删除</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/webjars/jquery/3.6.4/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/4.6.0/js/bootstrap.min.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.min.js"></script>
<script>
    const { createApp } = Vue

    createApp({
        data() {
            return {
                items: [],
                page: 1,
                size: 10,
                totalPages: 1,
                keyword: '',
                deleteId: null,
                deleteFrameSn: '',
                successMessage: '',
                errorMessage: ''
            }
        },
        mounted() {
            // 从 URL 参数获取 keyword 和 page
            const urlParams = new URLSearchParams(window.location.search)
            this.keyword = urlParams.get('keyword') || ''
            this.page = parseInt(urlParams.get('page')) || 1
            this.loadData()
        },
        methods: {
            loadData() {
                const url = '/api/uavs?keyword=' + encodeURIComponent(this.keyword) + 
                            '&page=' + this.page + '&size=' + this.size
                fetch(url)
                    .then(response => response.json())
                    .then(data => {
                        this.items = data.items || []
                        this.page = data.page || 1
                        this.size = data.size || 10
                        this.totalPages = data.totalPages || 1
                    })
                    .catch(error => {
                        console.error('加载数据失败:', error)
                    })
            },
            confirmDelete(id, frameSn) {
                this.deleteId = id
                this.deleteFrameSn = frameSn
                $('#deleteModal').modal('show')
            },
            deleteUav() {
                if (this.deleteId) {
                    fetch('/api/uavs/' + this.deleteId, {
                        method: 'DELETE'
                    })
                    .then(response => {
                        if (response.ok) {
                            this.successMessage = '删除成功'
                            this.errorMessage = ''
                            $('#deleteModal').modal('hide')
                            this.loadData()
                        } else {
                            this.errorMessage = '删除失败'
                            this.successMessage = ''
                        }
                    })
                    .catch(error => {
                        console.error('删除失败:', error)
                        this.errorMessage = '删除失败'
                        this.successMessage = ''
                    })
                }
            },
            getStatusClass(status) {
                if (!status) return 'badge badge-secondary'
                switch(status) {
                    case 'IDLE': return 'badge badge-success'
                    case 'FLYING': return 'badge badge-primary'
                    case 'CHARGING': return 'badge badge-info'
                    case 'FAULT': return 'badge badge-danger'
                    case 'MAINTENANCE': return 'badge badge-warning'
                    case 'SCRAPPED': return 'badge badge-secondary'
                    default: return 'badge badge-secondary'
                }
            },
            getStatusText(status) {
                if (!status) return '未知'
                switch(status) {
                    case 'IDLE': return '空闲'
                    case 'FLYING': return '飞行中'
                    case 'CHARGING': return '充电中'
                    case 'FAULT': return '故障'
                    case 'MAINTENANCE': return '维修中'
                    case 'SCRAPPED': return '报废'
                    default: return status
                }
            }
        }
    }).mount('#app')
</script>
</body>
</html>
