<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>登录 — 无人机台账</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/4.6.0/css/bootstrap.min.css}"/>
</head>
<body>
<div class="container" style="max-width:420px;margin-top:80px;">
    <h3 class="text-center mb-4">无人机台账</h3>
    <div class="card">
        <div class="card-header">登录</div>
        <div class="card-body">
            <div class="alert alert-danger" th:if="${loginError}" th:text="${loginError}"></div>
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input id="username" name="username" class="form-control" required="required" autocomplete="username"/>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input id="password" name="password" type="password" class="form-control" required="required"
                           autocomplete="current-password"/>
                </div>
                <button type="submit" class="btn btn-primary btn-block">登录</button>
            </form>
            <p class="text-muted mt-3" style="font-size:12px;">演示账号：admin / admin123</p>
        </div>
    </div>
</div>
<script th:src="@{/webjars/jquery/3.6.4/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/4.6.0/js/bootstrap.min.js}"></script>
</body>
</html>
